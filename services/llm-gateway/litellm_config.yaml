model_list:
  # Fast / cheap — used for parameter translation and profile building
  - model_name: fast
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  # Mid-tier — used for narrator agent
  - model_name: narrator
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # Strong — used for guardrail agent (more reliable rule-following)
  - model_name: guardrail
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  success_callback: []
  failure_callback: []
  request_timeout: 30
  drop_params: true
